services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: passport
      POSTGRES_PASSWORD: passport
      POSTGRES_DB: shchelochi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
